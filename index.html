<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sipster: find your cup</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍹</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <main class="page">

    <header class="hero">
      <p class="eyebrow">✦ sipster ✦</p>
      <h1 class="title">how are you feeling?</h1>
      <p class="subtitle">I'll pour you something to match the mood.</p>
    </header>

    <section class="controls">

      <div class="search-row">
        <input
          type="text"
          id="moodSearch"
          class="mood-search"
          placeholder="search a mood: cozy, stressed, adventurous..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="clearSearch" class="clear-btn" aria-label="clear search" title="clear search">✕</button>
      </div>

      <div class="chip-row" id="moodChips" role="group" aria-label="mood options"></div>

      <div class="toggle-row">
        <div class="toggle-group" id="tempToggle" data-group="temperature" role="group" aria-label="temperature preference">
          <span class="toggle-label">temp</span>
          <button class="toggle-pill is-active" data-value="any">either</button>
          <button class="toggle-pill" data-value="hot">hot</button>
          <button class="toggle-pill" data-value="cold">cold</button>
        </div>

        <div class="toggle-group" id="alcToggle" data-group="alcohol" role="group" aria-label="alcohol preference">
          <span class="toggle-label">style</span>
          <button class="toggle-pill is-active" data-value="any">either</button>
          <button class="toggle-pill" data-value="non-alcoholic">non-alc</button>
          <button class="toggle-pill" data-value="alcoholic">alcoholic</button>
        </div>
      </div>

      <button id="surpriseBtn" class="surprise-btn" data-glow="#F4D9A0">✦ surprise me ✦</button>

    </section>

    <section class="result" aria-live="polite">
      <div class="result-empty" id="resultEmpty">
        <p>pick a mood above, or hit <em>surprise me</em>, and I'll find you something to sip.</p>
      </div>

      <article class="result-card" id="resultCard" hidden>
        <div class="result-visual" id="resultVisual">
          <div class="result-blob" id="resultBlob"></div>
          <span class="result-garnish" id="resultGarnish"></span>
        </div>

        <div class="result-body">
          <h2 class="result-name" id="resultName"></h2>
          <p class="result-desc" id="resultDesc"></p>

          <div class="result-tags" id="resultTags"></div>
          <div class="result-meta" id="resultMeta"></div>

          <h3 class="result-subhead">you'll need</h3>
          <ul class="result-ingredients" id="resultIngredients"></ul>

          <button class="simplify-btn" id="simplifyBtn" hidden></button>
        </div>
      </article>
    </section>

    <footer class="footer">
      <p>✦ a small curated menu, picked just for your mood ✦</p>
    </footer>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
